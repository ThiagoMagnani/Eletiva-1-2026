<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main class="container">
      <h1></h1>
      <form class="row g-3">
        <label for="inputPartnerName" class="col-sm-2 col-form-label"
          >Partner Name</label
        >
        <div class="col-sm-4">
          <input type="email" class="form-control" id="inputPartnerName" />
        </div>
        <label for="inputPartnerEmailID" class="col-sm-2 col-form-label"
          >Partner Email ID</label
        >
        <div class="col-sm-4">
          <input type="email" class="form-control" id="inputPartnerEmailID" />
        </div>
        <label for="inputPartnerLegalName" class="col-sm-2 col-form-label"
          >Partner Legal Name</label
        >
        <div class="col-sm-4">
          <input type="email" class="form-control" id="inputPartnerLegalName" />
        </div>
        <label for="inputPartnerMobile" class="col-sm-2 col-form-label"
          >Partner Mobile</label
        >
        <div class="col-sm-4">
          <input type="email" class="form-control" id="inputPartnerMobile" />
        </div>
        <div class="mb-2">
          <label for="inputPartnerAddress" class="col-sm-2 col-form-label"
            >Partner Address</label
          >
          <textarea
            type="text"
            id="inputPartnerAddress"
            class="form-control"
          ></textarea>
        </div>
        <label for="inputContractStart" class="col-sm-2 col-form-label"
          >Contract Start Date</label
        >
        <div class="col-sm-4">
          <input type="date" class="form-control" id="inputContractStart" />
        </div>
        <label for="inputContractExpiry" class="col-sm-2 col-form-label"
          >Contract Expiry Date</label
        >
        <div class="col-sm-4">
          <input type="date" class="form-control" id="inputContractExpiry" />
        </div>
        <label for="inputMinimumLoanAmount" class="col-sm-2 col-form-label"
          >Minimum Loan Amount</label
        >
        <div class="col-sm-4">
          <input
            type="number"
            class="form-control"
            id="inputMinimumLoanAmount"
          />
        </div>
        <label for="inputMaximumLoanAmount" class="col-sm-2 col-form-label"
          >Maximum Loan Amount</label
        >
        <div class="col-sm-4">
          <input
            type="number"
            class="form-control"
            id="inputMaximumLoanAmount"
          />
        </div>
        <label for="inputInterestRate" class="col-sm-2 col-form-label"
          >Interest Rate</label
        >
        <div class="col-sm-4">
          <input type="number" class="form-control" id="inputInterestRate" />
        </div>
        <label for="inputDepositAmount" class="col-sm-2 col-form-label"
          >Deposit Amount</label
        >
        <div class="col-sm-4">
          <input type="number" class="form-control" id="inputDepositAmount" />
        </div>
        <h5></h5>
        <div class="grid text-center">
          <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
      </form>
    </main>
  </body>
</html>
