<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main class="container">
      <h1></h1>
      <form class="row g-3">
        <div class="col-md-4">
          <label for="inputPrimeiroNome" class="form-label">Primeiro Nome</label>
          <input type="text" class="form-control" id="inputPrimeiroNome" placeholder="Roberto"/>
        </div>
        <div class="col-md-4">
          <label for="inputUltimoNome" class="form-label">Último Nome</label>
          <input type="text" class="form-control" id="inputUltimoNome" placeholder="Silva"/>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="autoSizingInputGroup">Username</label>
          <div class="input-group">
            <div class="input-group-text">@</div>
            <input type="text" class="form-control" id="autoSizingInputGroup" placeholder="Username">
          </div>
        </div>
        <div class="col-md-6">
          <label for="inputCidade" class="form-label">Cidade</label>
          <input type="text" class="form-control" id="inputCidade" placeholder="São Paulo"/>
        </div>
        <div class="col-md-3">
          <label for="inputEstado" class="form-label">Estado</label>
          <input type="text" class="form-control" id="inputEstado" placeholder="SP"/>
        </div>
        <div class="col-md-3">
          <label for="inputZip" class="form-label">CEP</label>
          <input type="text" class="form-control" id="inputZip" placeholder="01310-100"/>
        </div>
        <div class="col-auto">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="autoSizingCheck">
          <label class="form-check-label" for="autoSizingCheck">
            Aceitar os termos e condições
          </label>
        </div>
        <h5></h5>
        <div class="col-auto">
          <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
      </form>
    </main>
  </body>
</html>
