<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main class="container">
      <h1></h1>
      <form class="row g-3">
        <div class="col-md-1">
          <label for="inputCodigo" class="form-label">Código</label>
          <input
            type="text"
            class="form-control"
            id="inputCodigo"
            placeholder="32"
          />
        </div>
        <div class="col-md-4">
          <label for="inputNome" class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            id="inputNome"
            placeholder="Roberto"
          />
        </div>
        <div class="col-md-4">
          <label for="inputEmail" class="form-label">E-mail</label>
          <input
            type="email"
            class="form-control"
            id="inputEmail"
            placeholder="roberto.silva@example.com"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="autoSizingInputGroup">CPF</label>
          <input
            type="text"
            class="form-control"
            id="autoSizingInputGroup"
            placeholder="000.000.000-00"
          />
        </div>
        <div class="col-md-2">
          <label for="inputCelular" class="form-label">N° Celular</label>
          <input
            type="text"
            class="form-control"
            id="inputCelular"
            placeholder="(11) 99999-9999"
          />
        </div>
        <div class="col-md-2">
          <label for="inputTelefoneFixo" class="form-label"
            >Telefone Fixo</label
          >
          <input
            type="text"
            class="form-control"
            id="inputTelefoneFixo"
            placeholder="(11) 3333-3333"
          />
        </div>
        <div class="col-md-2">
          <label for="inputZip" class="form-label">CEP</label>
          <input
            type="text"
            class="form-control"
            id="inputZip"
            placeholder="01310-100"
          />
        </div>
        <div class="col-md-2">
          <label for="inputLogradouro" class="form-label">Logradouro</label>
          <input
            type="text"
            class="form-control"
            id="inputLogradouro"
            placeholder="Av. Paulista, 1000"
          />
        </div>
        <div class="col-md-1">
          <label for="inputNumero" class="form-label">N°</label>
          <input
            type="text"
            class="form-control"
            id="inputNumero"
            placeholder="999"
          />
        </div>
        <div class="col-md-3">
          <label for="inputBairro" class="form-label">Bairro</label>
          <input
            type="text"
            class="form-control"
            id="inputBairro"
            placeholder="Bairro"
          />
        </div>
        <div class="col-md-2">
          <label for="inputCidade" class="form-label">Cidade</label>
          <input
            type="text"
            class="form-control"
            id="inputCidade"
            placeholder="São Paulo"
          />
        </div>
        <div class="col-md-1">
          <label for="inputEstado" class="form-label">UF</label>
          <input
            type="text"
            class="form-control"
            id="inputEstado"
            placeholder="SP"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="autoSizingSelect">Status</label>
          <select class="form-select" id="autoSizingSelect">
            <option selected>Choose...</option>
            <option value="1">Solteiro</option>
            <option value="2">Casado</option>
            <option value="3">Divorciado</option>
          </select>
        </div>
        <h5></h5>
        <div class="grid text-end">
          <button type="reset" class="btn btn-primary">Resetar</button>
          <button type="button" class="btn btn-secondary">Próximo</button>
        </div>
      </form>
    </main>
  </body>
</html>
