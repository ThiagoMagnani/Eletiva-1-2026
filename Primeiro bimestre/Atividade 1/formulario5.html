<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main class="container">
      <h1></h1>
      <form class="row g-3">
        <div class="col-md-3">
          <label for="inputPrimeiroNome" class="form-label"
            >Primeiro Nome</label
          >
          <input
            type="text"
            class="form-control"
            id="inputPrimeiroNome"
            placeholder="Roberto"
          />
        </div>
        <div class="col-md-3">
          <label for="inputUltimoNome" class="form-label">Último Nome</label>
          <input
            type="text"
            class="form-control"
            id="inputUltimoNome"
            placeholder="Silva"
          />
        </div>
        <div class="col-md-6"></div>
        <div class="col-md-6">
          <label class="form-label" for="autoSizingInputGroup">Username</label>
          <div class="input-group">
            <div class="input-group-text">@</div>
            <input
              type="text"
              class="form-control"
              id="autoSizingInputGroup"
              placeholder="Username"
            />
          </div>
        </div>
        <div class="col-md-6"></div>
        <div class="col-md-6">
          <label for="inputEmail" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="inputEmail"
            placeholder="exemplo@email.com"
          />
        </div>
        <div class="col-md-6"></div>
        <div class="col-md-6">
          <label for="inputEndereco" class="form-label">Endereço</label>
          <input
            type="text"
            class="form-control"
            id="inputEndereco"
            placeholder="Av. Paulista, 1000"
          />
        </div>
        <div class="col-md-6"></div>
        <div class="col-md-6">
          <label for="inputEndereco2" class="form-label"
            >Endereço 2 (Opcional)</label
          >
          <input
            type="text"
            class="form-control"
            id="inputEndereco2"
            placeholder="Apartamento 101"
          />
        </div>
        <div class="col-md-6"></div>
        <div class="col-2">
          <label class="form-label" for="autoSizingSelect">País</label>
          <select class="form-select" id="autoSizingSelect">
            <option selected>---</option>
            <option value="1">País1</option>
            <option value="2">País2</option>
            <option value="3">País3</option>
          </select>
        </div>
        <div class="col-2">
          <label class="form-label" for="autoSizingSelect">Estado</label>
          <select class="form-select" id="autoSizingSelect">
            <option selected>---</option>
            <option value="1">Estado1</option>
            <option value="2">Estado2</option>
            <option value="3">Estado3</option>
          </select>
        </div>
        <div class="col-md-2">
          <label for="inputCep" class="form-label">Cep</label>
          <input
            type="text"
            class="form-control"
            id="inputCep"
            placeholder="00000-000"
          />
        </div>
        <div class="col-md-6"></div>
        <div class="col-auto">
          <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
      </form>
    </main>
  </body>
</html>
